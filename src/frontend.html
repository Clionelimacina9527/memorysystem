<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人数字记忆系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--border:#e0e4eb;--text:#1a2030;--muted:#8a94a6;--accent:#2f6be8;--accent-light:#edf2fd;--red:#e84040;--header-bg:#f4f6fa;--row-sel:#ddeeff;--row-h:36px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f3f7;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:13px;min-height:100vh;}
#loadingScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#e4ebf8,#f0f3f7);flex-direction:column;gap:14px;}
.loading-logo{font-size:1.2rem;font-weight:700;color:var(--accent);}
.loading-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#authScreen{display:none;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#e4ebf8,#f0f3f7);}
.auth-card{background:var(--white);border-radius:14px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.09);}
.auth-logo{font-size:1.2rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:4px;}
.auth-sub{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:22px;}
.auth-tabs{display:flex;background:#f0f3f7;border-radius:7px;padding:3px;margin-bottom:18px;}
.auth-tab{flex:1;padding:7px;text-align:center;border-radius:5px;cursor:pointer;font-size:.82rem;color:var(--muted);transition:all .15s;}
.auth-tab.active{background:var(--white);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.auth-form{display:none;flex-direction:column;gap:11px;}
.auth-form.active{display:flex;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:.72rem;color:var(--muted);font-weight:500;}
.field input{border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-size:.86rem;font-family:'Noto Sans SC',sans-serif;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--accent);}
.auth-error{color:var(--red);font-size:.76rem;text-align:center;min-height:15px;}
.btn-auth{background:var(--accent);border:none;border-radius:7px;padding:11px;color:white;font-size:.86rem;font-family:'Noto Sans SC',sans-serif;font-weight:500;cursor:pointer;}
.btn-auth:hover{opacity:.88;}
#appScreen{display:none;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.topbar-title{font-size:.95rem;font-weight:700;color:var(--text);flex:1;}
.topbar-user{font-size:.78rem;color:var(--muted);}
.btn-logout{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 11px;font-size:.75rem;color:var(--muted);cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.btn-notif{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 11px;font-size:.78rem;color:var(--text);cursor:pointer;font-family:'Noto Sans SC',sans-serif;display:none;}
.notif-badge{background:var(--red);color:white;border-radius:10px;padding:1px 6px;font-size:.68rem;font-weight:700;margin-left:3px;}
.toolbar{padding:9px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--white);border-bottom:1px solid var(--border);}
.filter-label{font-size:.75rem;color:var(--muted);white-space:nowrap;}
.filter-select{border:1px solid var(--border);border-radius:5px;padding:5px 9px;font-size:.78rem;font-family:'Noto Sans SC',sans-serif;outline:none;width:180px;background:white;cursor:pointer;color:var(--text);}
.filter-select:focus{border-color:var(--accent);}
.filter-input{border:1px solid var(--border);border-radius:5px;padding:5px 9px;font-size:.78rem;font-family:'Noto Sans SC',sans-serif;outline:none;width:130px;}
.filter-input:focus{border-color:var(--accent);}
.btn-export,.btn-add{background:var(--accent);border:none;border-radius:6px;padding:7px 16px;color:white;font-size:.8rem;font-family:'Noto Sans SC',sans-serif;font-weight:500;cursor:pointer;}
.btn-add{margin-left:auto;}
.btn-export:hover,.btn-add:hover{opacity:.88;}
.btn-export:disabled{opacity:.5;cursor:not-allowed;}
.table-wrap{overflow-x:auto;padding:14px 20px 0;}
table{width:100%;border-collapse:collapse;background:var(--white);border-radius:8px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.06);min-width:1000px;}
thead tr{background:var(--header-bg);}
th{padding:9px 12px;text-align:left;font-size:.73rem;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
.th-select,.td-select{width:36px;min-width:36px;padding:0 8px;text-align:center;}
tbody tr{border-bottom:1px solid var(--border);height:var(--row-h);background:var(--white);}
tbody tr:last-child{border-bottom:none;}
.data-row{cursor:pointer;}
.data-row:hover{background:var(--accent-light)!important;}
.data-row.row-expanded{background:var(--accent-light)!important;}
.expand-row{background:#f7faff!important;}
.expand-panel{padding:16px 24px 18px!important;border-top:2px solid var(--accent);}
.expand-fields{display:flex;flex-wrap:wrap;gap:12px 24px;margin-bottom:14px;}
.ef-item{display:flex;flex-direction:column;gap:3px;min-width:160px;max-width:320px;}
.ef-label{font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.04em;}
.ef-val{font-size:.84rem;color:var(--text);line-height:1.6;white-space:pre-wrap;}
.ef-editable{cursor:text;}
.ef-edit-ta{display:block;width:100%;border:none;outline:2px solid var(--accent);outline-offset:-1px;background:white;font-size:.84rem;color:var(--text);font-family:'Noto Sans SC',sans-serif;line-height:1.6;resize:none;padding:0;white-space:pre-wrap;box-sizing:border-box;}
.expand-divider{height:1px;background:var(--border);margin-bottom:14px;}
.td-date{padding:0 12px;height:var(--row-h);font-size:.8rem;color:var(--accent);font-weight:600;white-space:nowrap;min-width:95px;}
.td-cell{padding:0 12px;height:var(--row-h);font-size:.8rem;color:var(--text);min-width:140px;max-width:200px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.td-sub{padding:0 12px;height:var(--row-h);font-size:.76rem;color:var(--muted);white-space:nowrap;}
.td-act{padding:0 10px;height:var(--row-h);white-space:nowrap;}
td.ed{cursor:cell;}
td.active-cell{padding:0!important;background:#fff!important;outline:2px solid var(--accent);outline-offset:-2px;}
.ghost-input{display:block;width:100%;height:var(--row-h);padding:0 12px;border:none;outline:none;background:transparent;font-size:.8rem;font-family:'Noto Sans SC',sans-serif;color:var(--text);}
textarea.ghost-input{height:80px;resize:none;overflow-y:auto;vertical-align:top;padding:4px 12px;}
.new-row{background:#f0f7ff!important;}
.new-row td{border-top:1px solid #aac8f0;border-bottom:1px solid #aac8f0;height:var(--row-h);}
.nc{padding:0 4px;}
.nr-inp{display:block;width:100%;height:var(--row-h);border:none;border-bottom:1px solid transparent;padding:0 8px;font-size:.8rem;font-family:'Noto Sans SC',sans-serif;outline:none;background:transparent;color:var(--text);}
.nr-inp:focus{border-bottom-color:var(--accent);}
textarea.nr-inp{height:72px;resize:none;padding:6px 8px;line-height:1.5;vertical-align:top;overflow-y:auto;}
.nr-inp::placeholder{color:#bcc4d0;}
.btn-sv{background:var(--accent);border:none;border-radius:3px;padding:3px 9px;color:white;font-size:.74rem;cursor:pointer;margin-right:3px;}
.btn-cx{background:none;border:1px solid var(--border);border-radius:3px;padding:2px 8px;color:var(--muted);font-size:.74rem;cursor:pointer;}
.btn-del{background:none;border:none;font-size:.74rem;color:var(--red);cursor:pointer;font-family:'Noto Sans SC',sans-serif;opacity:.7;}
.btn-del:hover{opacity:1;}
.btn-comment{background:none;border:none;font-size:.74rem;color:var(--accent);cursor:pointer;font-family:'Noto Sans SC',sans-serif;opacity:.8;margin-right:4px;}
.tag-chip{display:inline-flex;align-items:center;max-width:100%;border:1px solid #b9d2ff;background:#eef5ff;color:#2258c8;border-radius:5px;padding:2px 7px;margin-right:6px;font-size:.72rem;font-family:'Noto Sans SC',sans-serif;cursor:pointer;vertical-align:middle;white-space:nowrap;}
.tag-chip:hover{background:#dfeeff;}
.nr-stack{display:flex;flex-direction:column;gap:4px;padding:4px 0;}
.nr-tag-row{display:flex;gap:4px;}
.nr-tag{height:24px;border:1px solid var(--border);border-radius:4px;padding:0 7px;font-size:.74rem;font-family:'Noto Sans SC',sans-serif;outline:none;background:white;min-width:0;}
.nr-tag.name{flex:1;}
.tag-summary{display:inline-flex;align-items:center;gap:8px;border:1px solid #b9d2ff;background:#eef5ff;color:#2258c8;border-radius:6px;padding:6px 10px;margin-bottom:12px;cursor:pointer;font-size:.8rem;}
.tag-summary:hover{background:#dfeeff;}
.tag-modal{width:92vw;max-width:600px;max-height:80vh;overflow-y:auto;}
.tag-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tag-meta{font-size:.78rem;color:var(--muted);margin-bottom:12px;}
.tag-timeline{display:flex;flex-direction:column;gap:8px;}
.tag-entry{display:grid;grid-template-columns:86px 1fr;gap:10px;border-top:1px solid var(--border);padding-top:9px;}
.tag-date{font-size:.78rem;color:var(--accent);font-weight:600;}
.tag-title{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px;}
.tag-note{font-size:.78rem;color:var(--muted);line-height:1.5;white-space:pre-wrap;}
.tag-manage-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.tag-manage-row input{flex:1;min-width:0;border:1px solid var(--border);border-radius:5px;padding:6px 8px;font-size:.8rem;font-family:'Noto Sans SC',sans-serif;}
.tag-manage-row.tag-manage-child{padding-left:22px;}
.tag-manage-row.tag-manage-child::before{content:'└';color:var(--muted);margin-right:-2px;}
.tag-manage-actions{display:flex;gap:5px;flex-shrink:0;}
.tag-manage-empty{padding:18px 0;color:var(--muted);font-size:.82rem;text-align:center;}
.tag-parent-select{border:1px solid var(--border);border-radius:5px;padding:6px 8px;font-size:.78rem;font-family:'Noto Sans SC',sans-serif;width:118px;min-width:0;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;}
.tag-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.tag-edit-row label{font-size:.74rem;color:var(--muted);font-weight:600;}
.tag-edit-select{border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:.78rem;font-family:'Noto Sans SC',sans-serif;min-width:180px;background:white;color:var(--text);}
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
.no-comment{font-size:.78rem;color:var(--muted);padding:6px 0;}
.comment-item{display:flex;gap:9px;align-items:flex-start;}
.comment-avatar-sm{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#6ea8fe,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:white;flex-shrink:0;}
.comment-body{flex:1;}
.comment-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.comment-name{font-size:.78rem;font-weight:600;color:var(--text);}
.comment-time{font-size:.7rem;color:var(--muted);}
.btn-del-comment{background:none;border:none;font-size:.7rem;color:var(--red);cursor:pointer;opacity:.6;font-family:'Noto Sans SC',sans-serif;}
.btn-reply-sm{background:none;border:none;font-size:.72rem;color:var(--accent);cursor:pointer;font-family:'Noto Sans SC',sans-serif;opacity:.75;margin-left:4px;}
.comment-text{font-size:.82rem;color:var(--text);line-height:1.6;}
.comment-reply-badge{display:inline-block;background:#edf2fd;color:var(--accent);border-radius:4px;padding:1px 6px;font-size:.72rem;margin-right:5px;vertical-align:middle;}
.comment-input-wrap{padding-top:10px;border-top:1px solid var(--border);}
.comment-reply-hint{display:flex;align-items:center;gap:6px;background:#f4f6fa;border-radius:6px;padding:5px 10px;font-size:.76rem;color:var(--muted);margin-bottom:8px;}
.crh-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.crh-cancel{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:0;line-height:1;flex-shrink:0;font-family:sans-serif;}
.comment-input-row{display:flex;align-items:center;gap:8px;}
.comment-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:white;flex-shrink:0;}
.comment-inp{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:.82rem;font-family:'Noto Sans SC',sans-serif;outline:none;}
.comment-inp:focus{border-color:var(--accent);}
.comment-send{background:var(--accent);border:none;border-radius:6px;padding:7px 14px;color:white;font-size:.78rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.notif-panel{position:fixed;top:54px;right:20px;width:320px;background:white;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:200;display:none;}
.notif-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600;}
.notif-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;}
.notif-list{max-height:340px;overflow-y:auto;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.notif-item:last-child{border-bottom:none;}
.notif-item:hover{background:var(--accent-light);}
.notif-item.unread{background:#fff8f0;}
.notif-who{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:3px;}
.notif-who span{color:var(--accent);}
.notif-time{font-size:.7rem;color:#bbb;margin-top:3px;}
.notif-empty{padding:24px 16px;text-align:center;color:var(--muted);font-size:.82rem;}
.empty-msg{text-align:center;padding:50px;color:var(--muted);font-size:.86rem;}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px 18px;background:transparent;}
.page-btn{border:1px solid var(--border);background:var(--white);border-radius:5px;padding:5px 14px;font-size:.8rem;cursor:pointer;color:var(--text);font-family:'Noto Sans SC',sans-serif;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.page-btn:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent);}
.page-btn:disabled{opacity:.4;cursor:not-allowed;}
.page-info{font-size:.8rem;color:var(--muted);white-space:nowrap;}
.attach-section{margin-bottom:14px;}
.attach-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.btn-attach{background:var(--accent);color:white;border:none;border-radius:4px;padding:3px 10px;font-size:.74rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.btn-attach:hover{opacity:.88;}
.attach-list{display:flex;flex-wrap:wrap;gap:10px;min-height:20px;}
.attach-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;}
.attach-thumb{width:90px;height:90px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;display:block;}
.attach-thumb:hover{opacity:.85;}
.attach-file{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--accent);text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:8px 10px;background:#f8faff;max-width:120px;}
.attach-file:hover{background:var(--accent-light);}
.attach-name{font-size:.68rem;color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.btn-del-attach{position:absolute;top:-5px;right:-5px;background:var(--red);color:white;border:none;border-radius:50%;width:17px;height:17px;font-size:.7rem;cursor:pointer;line-height:17px;text-align:center;padding:0;}
.no-attach{font-size:.78rem;color:var(--muted);}
.attach-uploading{font-size:.78rem;color:var(--muted);font-style:italic;}
.nr-file-row{display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding:3px 0;}
.btn-attach-sm{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:2px 8px;font-size:.72rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap;}
.btn-attach-sm:hover{background:#dfeeff;}
.nr-file-preview{display:flex;flex-wrap:wrap;gap:4px;}
.nr-file-tag{display:inline-flex;align-items:center;gap:3px;background:#f0f7ff;border:1px solid #aac8f0;border-radius:4px;padding:2px 6px;font-size:.7rem;color:var(--text);max-width:140px;}
.nr-file-tag span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nr-file-tag button{background:none;border:none;color:var(--red);cursor:pointer;font-size:.76rem;line-height:1;padding:0;flex-shrink:0;}
.btn-bulk-del{background:var(--red)!important;}
.btn-bulk-del:hover{opacity:.88;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center;}
.modal-box{background:white;border-radius:14px;padding:28px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.15);}
.modal-title{font-size:.95rem;font-weight:700;color:#1a2030;margin-bottom:18px;}
.modal-error{color:#e84040;font-size:.76rem;min-height:15px;margin-bottom:10px;text-align:center;}
.modal-btns{display:flex;gap:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a2030;color:white;padding:8px 20px;border-radius:18px;font-size:.8rem;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.undo-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a2030;color:white;padding:8px 10px 8px 20px;border-radius:18px;font-size:.8rem;opacity:0;transition:all .25s;z-index:1000;white-space:nowrap;display:flex;align-items:center;gap:12px;pointer-events:none;}
.undo-toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.undo-toast-btn{background:none;border:1px solid rgba(255,255,255,.5);color:#7ab8ff;border-radius:12px;padding:3px 12px;cursor:pointer;font-size:.78rem;font-family:'Noto Sans SC',sans-serif;}
.undo-toast-btn:hover{background:rgba(255,255,255,.12);}
.hl-mark{background:#fff1a8;color:inherit;border-radius:2px;padding:0 1px;}
.stats-grid{display:flex;gap:10px;}
.stats-item{flex:1;text-align:center;background:var(--accent-light);border-radius:10px;padding:14px 6px;}
.stats-num{font-size:1.4rem;font-weight:700;color:var(--accent);}
.stats-label{font-size:.72rem;color:var(--muted);margin-top:4px;}
.today-banner{display:none;align-items:center;justify-content:space-between;gap:10px;background:#fff7e0;border-bottom:1px solid #f0d896;color:#7a5c00;font-size:.8rem;padding:8px 16px;}
.today-banner.show{display:flex;}
.today-banner-close{background:none;border:none;color:#7a5c00;font-size:1rem;cursor:pointer;line-height:1;padding:0 4px;}
@media(max-width:768px){
  table{min-width:0;width:100%;}
  .th-select,.td-select,
  th:nth-child(4),th:nth-child(5),th:nth-child(6),th:nth-child(7),
  tbody td:nth-child(4),tbody td:nth-child(5),tbody td:nth-child(6),tbody td:nth-child(7){display:none;}
  .td-cell{max-width:120px;}
  .table-wrap{padding:8px 6px 0;overflow-x:hidden;}
  .topbar{padding:0 10px;gap:6px;}
  .topbar-title{font-size:.82rem;}
  .toolbar{padding:7px 10px;gap:6px;}
  .filter-select{width:120px;}
  .filter-input{width:90px;}
  .btn-add{margin-left:0;}
  .expand-fields{flex-direction:column;}
  .ef-item{max-width:100%;}
}
</style>
</head>
<body>
<div id="loadingScreen"><div class="loading-logo">🧠 个人数字记忆系统</div><div class="loading-spinner"></div></div>
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">🧠 个人数字记忆系统</div>
    <div class="auth-sub">团队每日记忆记录系统</div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">登录</div>
      <div class="auth-tab" onclick="switchTab('register')">注册</div>
    </div>
    <div class="auth-form active" id="loginForm">
      <div class="field"><label>邮箱</label><input type="email" id="loginEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const PAGE_SIZE = 50;
let currentUser = null;
let allRecords = [];
let newRowActive = false;
let commentCounts = {};
let commentCache = {};
let allTags = [];
let selectedIds = new Set();
let resetTargetId = null;
let currentPage = 1;
let totalRecords = 0;
let totalPages = 0;
let currentFilters = { author: '', dateFrom: '', dateTo: '', tag: '', keyword: '' };
let debounceTimer = null;
let pendingNewRowFiles = [];
let draftSaveTimer = null;
const DRAFT_KEY = 'memory_newrow_draft';
let pendingDeleteIds = new Set();
let pendingDelete = null;
const UNDO_DELAY = 5000;

// ── Utilities ──────────────────────────────────────────────────────────────
var _esc = document.createElement('div');
function escapeHTML(s) { _esc.textContent = (s || ''); return _esc.innerHTML; }
function displayText(s) { return (s || '').split(String.fromCharCode(10)).map(l => escapeHTML(l)).join('<br>'); }
function firstLine(s) { return escapeHTML((s || '').split(String.fromCharCode(10))[0]); }
function hl(escapedHtml) {
  const kw = (currentFilters.keyword || '').trim();
  if (!kw) return escapedHtml;
  const escKw = escapeHTML(kw).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  if (!escKw) return escapedHtml;
  return escapedHtml.replace(new RegExp(escKw, 'gi'), m => '<mark class="hl-mark">' + m + '</mark>');
}

function show(id) { document.getElementById(id).style.display = id === 'authScreen' ? 'flex' : 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function showModal(id) { document.getElementById(id).style.display = 'flex'; }
function hideModal(id) { document.getElementById(id).style.display = 'none'; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(() => t.classList.remove('show'), 2200);
}
function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('memory_token') };
}

async function checkTodayBanner() {
  if (!currentUser) return;
  const today = new Date().toISOString().split('T')[0];
  if (sessionStorage.getItem('memory_today_dismiss') === today) return;
  const params = new URLSearchParams({ page: 1, pageSize: 1, author: currentUser.name, dateFrom: today, dateTo: today });
  const res = await fetch('/api/worklogs?' + params, { headers: authHeaders() });
  if (!res.ok) return;
  const data = await res.json();
  document.getElementById('todayBanner').classList.toggle('show', data.total === 0);
}
function dismissTodayBanner() {
  const today = new Date().toISOString().split('T')[0];
  sessionStorage.setItem('memory_today_dismiss', today);
  document.getElementById('todayBanner').classList.remove('show');
}

// ── Init ───────────────────────────────────────────────────────────────────
const saved = localStorage.getItem('memory_user');
if (saved) {
  currentUser = JSON.parse(saved);
  show('appScreen'); hide('loadingScreen');
  document.getElementById('topUser').textContent = currentUser.name;
  if (currentUser.isAdmin) document.getElementById('adminBtn').style.display = 'inline-block';
  loadRecords(1);
  checkTodayBanner();
} else {
  hide('loadingScreen'); show('authScreen');
}

// ── Auth ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  document.getElementById('authError').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  document.getElementById('authError').textContent = '';
  if (!email || !pass) { document.getElementById('authError').textContent = '请填写邮箱和密码'; return; }
  const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: pass }) });
  const data = await res.json();
  if (!res.ok) { document.getElementById('authError').textContent = data.error; return; }
  localStorage.setItem('memory_token', data.token);
  localStorage.setItem('memory_user', JSON.stringify(data.user));
  currentUser = data.user;
  hide('authScreen'); show('appScreen');
  document.getElementById('topUser').textContent = currentUser.name;
  if (currentUser.isAdmin) document.getElementById('adminBtn').style.display = 'inline-block';
  loadRecords(1);
  checkTodayBanner();
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const invite = document.getElementById('regInvite').value.trim();
  const errEl = document.getElementById('regError');
  const btn = document.getElementById('regBtn');
  errEl.textContent = '';
  if (!name || !email || !pass || !invite) { errEl.textContent = '请填写所有字段'; return; }
  btn.textContent = '注册中…'; btn.disabled = true;
  const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password: pass, inviteCode: invite }) });
  const data = await res.json();
  if (!res.ok) { errEl.textContent = data.error; btn.textContent = '注册'; btn.disabled = false; return; }
  localStorage.setItem('memory_token', data.token);
  localStorage.setItem('memory_user', JSON.stringify(data.user));
  currentUser = data.user;
  hide('authScreen'); show('appScreen');
  document.getElementById('topUser').textContent = currentUser.name;
  if (currentUser.isAdmin) document.getElementById('adminBtn').style.display = 'inline-block';
  loadRecords(1);
  checkTodayBanner();
}

function doLogout() {
  localStorage.removeItem('memory_token');
  localStorage.removeItem('memory_user');
  currentUser = null; allRecords = []; selectedIds.clear();
  hide('appScreen'); show('authScreen');
}

// ── Data Loading ───────────────────────────────────────────────────────────
async function loadRecords(page) {
  page = page || currentPage;
  currentPage = page;
  commentCache = {};
  const params = new URLSearchParams({ page, pageSize: PAGE_SIZE });
  if (currentFilters.author) params.set('author', currentFilters.author);
  if (currentFilters.dateFrom) params.set('dateFrom', currentFilters.dateFrom);
  if (currentFilters.dateTo) params.set('dateTo', currentFilters.dateTo);
  if (currentFilters.tag) params.set('tag', currentFilters.tag);
  if (currentFilters.keyword) params.set('keyword', currentFilters.keyword);

  const res = await fetch('/api/worklogs?' + params, { headers: authHeaders() });
  if (!res.ok) { if (res.status === 401) doLogout(); return; }
  const data = await res.json();
  allRecords = data.results;
  totalRecords = data.total;
  totalPages = Math.ceil(totalRecords / PAGE_SIZE) || 1;
  selectedIds = new Set(Array.from(selectedIds).filter(id => allRecords.some(r => r.id === id)));

  const cRes = await fetch('/api/comment-counts', { headers: authHeaders() });
  commentCounts = cRes.ok ? await cRes.json() : {};

  await loadTags();
  updateMemberDropdown(data.authors || []);
  updateTagFilterDropdown();
  renderTable();
  renderPagination();
  checkNotifications();
}

async function loadTags() {
  const res = await fetch('/api/tags', { headers: authHeaders() });
  allTags = res.ok ? await res.json() : [];
  updateTagOptions();
}

// ── Filters ────────────────────────────────────────────────────────────────
function readFilters() {
  currentFilters = {
    author: document.getElementById('filterUser').value,
    dateFrom: document.getElementById('filterDateFrom').value,
    dateTo: document.getElementById('filterDateTo').value,
    tag: document.getElementById('filterTag').value,
    keyword: document.getElementById('filterKeyword').value,
  };
}

function onFilterChange(isKeyword) {
  readFilters();
  if (isKeyword) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => loadRecords(1), 350);
  } else {
    loadRecords(1);
  }
}

// ── Pagination ─────────────────────────────────────────────────────────────
function renderPagination() {
  const el = document.getElementById('pagination');
  if (!el) return;
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  const info = '第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + totalRecords + ' 条';
  el.innerHTML =
    '<button class="page-btn" onclick="gotoPage(' + (currentPage - 1) + ')"' + (currentPage <= 1 ? ' disabled' : '') + '>‹ 上一页</button>' +
    '<span class="page-info">' + info + '</span>' +
    '<button class="page-btn" onclick="gotoPage(' + (currentPage + 1) + ')"' + (currentPage >= totalPages ? ' disabled' : '') + '>下一页 ›</button>';
}

function gotoPage(p) {
  if (p < 1 || p > totalPages) return;
  loadRecords(p);
}

// ── Member Dropdown ────────────────────────────────────────────────────────
function updateMemberDropdown(authors) {
  const sel = document.getElementById('filterUser');
  const cur = currentFilters.author;
  sel.innerHTML = '<option value="">全部成员</option>' +
    authors.map(n => '<option value="' + escapeHTML(n) + '"' + (n === cur ? ' selected' : '') + '>' + escapeHTML(n) + '</option>').join('');
}

function updateTagFilterDropdown() {
  const sel = document.getElementById('filterTag');
  const cur = currentFilters.tag;
  sel.innerHTML = '<option value="">全部标签</option>' + groupedTagOptionsHtml(cur);
}

// ── Tags UI ────────────────────────────────────────────────────────────────
function getRecordTag(r) {
  if (r.tag_name) return { id: r.tag_id, name: r.tag_name, note: r.tag_note || '' };
  return null;
}

// Renders top-level tags as flat <option>s, or as an <optgroup> with the
// parent itself plus its children when it has any — tags are 2 levels max.
function groupedTagOptionsHtml(selected) {
  const top = (allTags || []).filter(t => !t.parent_id);
  const childrenOf = pid => (allTags || []).filter(t => t.parent_id === pid);
  return top.map(t => {
    const kids = childrenOf(t.id);
    const opt = (name) => '<option value="' + escapeHTML(name) + '"' + (name === selected ? ' selected' : '') + '>';
    if (!kids.length) return opt(t.name) + escapeHTML(t.name) + '</option>';
    return '<optgroup label="' + escapeHTML(t.name) + '">' +
      opt(t.name) + escapeHTML(t.name) + '（不分类）</option>' +
      kids.map(k => opt(k.name) + escapeHTML(k.name) + '</option>').join('') +
      '</optgroup>';
  }).join('');
}

// Top-level tags only, for choosing a parent in tag management (max depth 2).
function topLevelParentOptionsHtml(selectedId, excludeId) {
  return '<option value="">无（设为一级标签）</option>' +
    (allTags || []).filter(t => !t.parent_id && t.id !== excludeId).map(t =>
      '<option value="' + t.id + '"' + (t.id === selectedId ? ' selected' : '') + '>' + escapeHTML(t.name) + '</option>'
    ).join('');
}

function tagOptionsHtml(selected, allowNew) {
  return '<option value="">不添加标签</option>' +
    groupedTagOptionsHtml(selected) +
    (allowNew ? '<option value="__new__">＋ 新建标签…</option>' : '');
}

function updateTagOptions() {
  const el = document.getElementById('nr_tag');
  if (el) el.innerHTML = tagOptionsHtml(el.value, true);
  document.querySelectorAll('.record-tag-select').forEach(sel => {
    sel.innerHTML = tagOptionsHtml(sel.dataset.current || '');
  });
}

function tagBadge(r) {
  const p = getRecordTag(r);
  if (!p || !p.name) return '';
  return '<button class="tag-chip" data-pid="' + (p.id || '') + '" data-project="' + encodeURIComponent(p.name) + '">' + escapeHTML(p.name) + '</button>';
}

function bindTagChips() {
  document.querySelectorAll('.tag-chip').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      showTagByName(decodeURIComponent(btn.dataset.project || ''));
    };
  });
}

// ── New-row draft autosave ────────────────────────────────────────────────
function onDraftInput() {
  clearTimeout(draftSaveTimer);
  draftSaveTimer = setTimeout(saveDraft, 400);
}
function saveDraft() {
  if (!newRowActive) return;
  const draft = {
    date: (document.getElementById('nr_date') || {}).value || '',
    done: (document.getElementById('nr_done') || {}).value || '',
    plan: (document.getElementById('nr_plan') || {}).value || '',
    problem: (document.getElementById('nr_problem') || {}).value || '',
    thinking: (document.getElementById('nr_thinking') || {}).value || '',
    important: (document.getElementById('nr_important') || {}).value || '',
    tagName: (document.getElementById('nr_tag') || {}).value || '',
  };
  if (!draft.done && !draft.plan && !draft.problem && !draft.thinking && !draft.important && !draft.tagName) {
    clearDraft();
    return;
  }
  localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
}
function clearDraft() { localStorage.removeItem(DRAFT_KEY); }
function restoreDraftIfAny() {
  const raw = localStorage.getItem(DRAFT_KEY);
  if (!raw) return;
  let draft;
  try { draft = JSON.parse(raw); } catch { clearDraft(); return; }
  const set = (id, v) => { const el = document.getElementById(id); if (el && v) el.value = v; };
  set('nr_date', draft.date);
  set('nr_done', draft.done);
  set('nr_plan', draft.plan);
  set('nr_problem', draft.problem);
  set('nr_thinking', draft.thinking);
  set('nr_important', draft.important);
  set('nr_tag', draft.tagName);
  showToast('已恢复上次未提交的草稿');
}

// ── New-row tag helpers ────────────────────────────────────────────────────
function _nrTagChange() {
  const sel = document.getElementById('nr_tag');
  const inp = document.getElementById('nr_tag_new');
  const btn = document.getElementById('nr_tag_btn');
  if (!sel || !inp) return;
  const isNew = sel.value === '__new__';
  inp.style.display = isNew ? 'inline-block' : 'none';
  if (btn) btn.style.display = isNew ? 'inline-block' : 'none';
  if (isNew) { sel.value = ''; inp.value = ''; inp.focus(); }
}

async function _nrTagConfirm(e) {
  if (e && e.keyCode !== 13) return;
  if (e) e.preventDefault();
  const inp = document.getElementById('nr_tag_new');
  const name = (inp && inp.value || '').trim();
  if (!name) return;
  const res = await fetch('/api/tags', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ name }) });
  const data = await res.json();
  if (!res.ok) { showToast(data.error || '创建失败'); return; }
  allTags.push({ id: data.id, name });
  updateTagOptions();
  const sel = document.getElementById('nr_tag');
  if (sel) sel.value = name;
  inp.style.display = 'none';
  const btn = document.getElementById('nr_tag_btn');
  if (btn) btn.style.display = 'none';
  inp.value = '';
  showToast('标签已创建 ✓');
  onDraftInput();
}

function _nrkd(e) {
  if (e.keyCode === 13) {
    e.preventDefault();
    if (e.shiftKey) {
      const t = e.target, s = t.selectionStart;
      t.value = t.value.slice(0, s) + String.fromCharCode(10) + t.value.slice(t.selectionEnd);
      t.selectionStart = t.selectionEnd = s + 1;
    } else {
      saveNewRow();
    }
  }
}

// ── Render Table ───────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const isAdmin = currentUser && currentUser.isAdmin;

// ── Inline Cell Editing ────────────────────────────────────────────────────
function startEdit(td) {
  if (td.dataset.editing) return;
  td.dataset.editing = '1';
  const id = parseInt(td.dataset.id), field = td.dataset.field;
  const rec = allRecords.find(r => r.id === id);
  if (!rec) return;
  const origVal = rec[field] || '', origText = td.textContent;
  td.classList.add('active-cell');
  if (field === 'date') {
    td.innerHTML = '<input class="ghost-input" type="date" value="' + origVal + '"/>';
  } else {
    td.innerHTML = '<textarea class="ghost-input"></textarea>';
  }
  const inp = td.querySelector('input,textarea');
  if (field !== 'date') inp.value = origVal;
  inp.focus();
  if (field !== 'date') inp.selectionStart = inp.selectionEnd = (inp.value || '').length;

  const commit = async () => {
    const newVal = inp.value.trim();
    delete td.dataset.editing; td.classList.remove('active-cell'); td.textContent = newVal;
    td.addEventListener('click', e => { e.stopPropagation(); startEdit(td); }, { once: true });
    if (newVal === origVal) return;
    const body = Object.assign({}, rec); body[field] = newVal;
    const res = await fetch('/api/worklogs/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
    if (res.ok) { rec[field] = newVal; showToast('已保存 ✓'); } else { showToast('保存失败'); td.textContent = origText; }
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); inp.blur(); }
    if (e.key === 'Enter' && e.shiftKey && inp.tagName === 'TEXTAREA') {
      e.preventDefault();
      const s = inp.selectionStart;
      inp.value = inp.value.slice(0, s) + String.fromCharCode(10) + inp.value.slice(inp.selectionEnd);
      inp.selectionStart = inp.selectionEnd = s + 1;
    }
    if (e.key === 'Escape') {
      inp.removeEventListener('blur', commit);
      delete td.dataset.editing; td.classList.remove('active-cell'); td.textContent = origText;
      td.addEventListener('click', e => { e.stopPropagation(); startEdit(td); }, { once: true });
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      const eds = Array.from(document.querySelectorAll('td.ed'));
      const idx = eds.indexOf(td);
      inp.removeEventListener('blur', commit);
      commit().then(() => { const next = eds[e.shiftKey ? idx - 1 : idx + 1]; if (next) next.click(); });
    }
  });
}

function startExpandEdit(el) {
  if (el.dataset.editing) return;
  el.dataset.editing = '1';
  const wid = parseInt(el.dataset.wid), field = el.dataset.field;
  const rec = allRecords.find(r => r.id === wid);
  if (!rec) return;
  const origVal = rec[field] || '';
  const efItem = el.closest ? el.closest('.ef-item') : el.parentElement;
  const lockW = efItem ? efItem.offsetWidth : 0;
  if (efItem && lockW) efItem.style.width = lockW + 'px';
  const ta = document.createElement('textarea');
  ta.className = 'ef-edit-ta';
  ta.value = origVal;
  el.innerHTML = ''; el.appendChild(ta);
  ta.style.height = '1px';
  ta.style.height = Math.max(ta.scrollHeight, 28) + 'px';
  ta.focus();
  ta.selectionStart = ta.selectionEnd = ta.value.length;
  let saved = false;
  const unlock = () => { if (efItem) efItem.style.width = ''; };
  const commit = () => {
    if (saved) return; saved = true;
    const newVal = ta.value;
    delete el.dataset.editing; unlock();
    if (newVal === origVal) { el.innerHTML = displayText(origVal); return; }
    fetch('/api/worklogs/' + wid, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(Object.assign({}, rec, { [field]: newVal })) })
      .then(res => {
        if (res.ok) { rec[field] = newVal; showToast('已保存 ✓'); } else showToast('保存失败');
        el.innerHTML = displayText(rec[field] || '');
      });
  };
  ta.addEventListener('blur', commit);
  ta.addEventListener('keydown', e => {
    if (e.keyCode === 13 && !e.shiftKey) { e.preventDefault(); ta.blur(); }
    if (e.keyCode === 13 && e.shiftKey) {
      e.preventDefault();
      const s = ta.selectionStart;
      ta.value = ta.value.slice(0, s) + String.fromCharCode(10) + ta.value.slice(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 1;
    }
    if (e.key === 'Escape') { saved = true; delete el.dataset.editing; unlock(); el.innerHTML = displayText(origVal); }
  });
}

// ── Row Actions ────────────────────────────────────────────────────────────
function addNewRow() {
  if (newRowActive) { const el = document.getElementById('nr_done'); if (el) el.focus(); return; }
  pendingNewRowFiles = [];
  newRowActive = true;
  renderTable();
  restoreDraftIfAny();
}
function cancelNewRow() { newRowActive = false; pendingNewRowFiles = []; clearDraft(); renderTable(); }

async function saveNewRow() {
  const date = (document.getElementById('nr_date') || {}).value || '';
  const done = ((document.getElementById('nr_done') || {}).value || '').trim();
  const plan = ((document.getElementById('nr_plan') || {}).value || '').trim();
  const problem = ((document.getElementById('nr_problem') || {}).value || '').trim();
  const thinking = ((document.getElementById('nr_thinking') || {}).value || '').trim();
  const important = ((document.getElementById('nr_important') || {}).value || '').trim();
  const tagName = ((document.getElementById('nr_tag') || {}).value || '').trim();
  if (!date) { showToast('请选择日期'); return; }
  if (!done && !plan && !tagName) { showToast('请至少填写今日完成、明日计划或标签'); return; }
  const res = await fetch('/api/worklogs', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ date, done, plan, problem, thinking, important, tagName }) });
  if (res.ok) {
    const { id: newId } = await res.json();
    newRowActive = false;
    if (pendingNewRowFiles.length) {
      showToast('上传附件中…');
      await Promise.all(pendingNewRowFiles.map(f => {
        const fd = new FormData();
        fd.append('file', f);
        return fetch('/api/worklogs/' + newId + '/attachments', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('memory_token') },
          body: fd
        });
      }));
      pendingNewRowFiles = [];
    }
    clearDraft();
    showToast('提交成功 ✓');
    await loadRecords(1);
    if (date === new Date().toISOString().split('T')[0]) document.getElementById('todayBanner').classList.remove('show');
  } else showToast('提交失败');
}

function delRecord(id) {
  if (pendingDelete) commitPendingDelete();
  pendingDelete = { ids: [id] };
  pendingDeleteIds = new Set([id]);
  renderTable();
  showUndoToast('已删除 1 条记录');
  pendingDelete.timer = setTimeout(commitPendingDelete, UNDO_DELAY);
}

function showUndoToast(msg) {
  const t = document.getElementById('undoToast');
  document.getElementById('undoToastMsg').textContent = msg + '，可撤销';
  t.classList.add('show');
}
function hideUndoToast() {
  document.getElementById('undoToast').classList.remove('show');
}

function undoDelete() {
  if (!pendingDelete) return;
  clearTimeout(pendingDelete.timer);
  pendingDelete = null;
  pendingDeleteIds = new Set();
  hideUndoToast();
  renderTable();
  showToast('已撤销删除');
}

async function commitPendingDelete() {
  if (!pendingDelete) return;
  const ids = pendingDelete.ids;
  clearTimeout(pendingDelete.timer);
  pendingDelete = null;
  hideUndoToast();
  let failed = 0;
  await Promise.all(ids.map(async id => {
    const res = await fetch('/api/worklogs/' + id, { method: 'DELETE', headers: authHeaders() });
    if (!res.ok) failed++;
  }));
  pendingDeleteIds = new Set();
  if (failed) showToast(failed + ' 条删除失败');
  const remaining = allRecords.filter(r => !ids.includes(r.id));
  const newPage = remaining.length === 0 && currentPage > 1 ? currentPage - 1 : currentPage;
  await loadRecords(newPage);
}

async function saveRecordTag(id) {
  const sel = document.getElementById('tag_sel_' + id);
  const rec = allRecords.find(r => r.id === id);
  if (!sel || !rec) return;
  const body = Object.assign({}, rec, { tagName: sel.value || '' });
  const res = await fetch('/api/worklogs/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
  if (res.ok) { showToast('标签已保存 ✓'); await loadRecords(currentPage); await toggleExpand(id); } else showToast('标签保存失败');
}

// ── Selection & Export ─────────────────────────────────────────────────────
function toggleRowSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  syncSelectAllCheckbox(); updateExportButton();
}

function toggleSelectAll(checked) {
  allRecords.forEach(r => { if (checked) selectedIds.add(r.id); else selectedIds.delete(r.id); });
  renderTable();
}

function syncSelectAllCheckbox() {
  const allBox = document.getElementById('selectAll');
  if (!allBox) return;
  const selectedCount = allRecords.filter(r => selectedIds.has(r.id)).length;
  allBox.checked = allRecords.length > 0 && selectedCount === allRecords.length;
  allBox.indeterminate = selectedCount > 0 && selectedCount < allRecords.length;
}

function updateExportButton() {
  const count = allRecords.filter(r => selectedIds.has(r.id)).length;
  const exportBtn = document.getElementById('exportBtn');
  const bulkBtn = document.getElementById('bulkDelBtn');
  if (exportBtn) exportBtn.disabled = count === 0;
  if (bulkBtn) bulkBtn.style.display = count > 0 ? 'inline-block' : 'none';
}

function escapeCSV(value) {
  const v = value == null ? '' : String(value);
  return '"' + v.replace(/"/g, '""') + '"';
}

function exportSelected() {
  const rows = allRecords.filter(r => selectedIds.has(r.id));
  if (!rows.length) { showToast('请先选择记录'); return; }
  const header = ['Date', 'Done', 'Tag', 'Plan', 'Problem', 'Thinking', 'Important', 'Author'];
  const lines = [header.map(escapeCSV).join(',')];
  rows.forEach(r => {
    const p = getRecordTag(r) || {};
    lines.push([r.date, r.done, p.name || '', r.plan, r.problem, r.thinking, r.important, r.author_name].map(escapeCSV).join(','));
  });
  const blob = new Blob(['﻿' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  link.href = URL.createObjectURL(blob);
  link.download = 'worklogs-' + today + '.csv';
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
}

async function exportAll() {
  const params = new URLSearchParams({ export: '1' });
  if (currentFilters.author) params.set('author', currentFilters.author);
  if (currentFilters.dateFrom) params.set('dateFrom', currentFilters.dateFrom);
  if (currentFilters.dateTo) params.set('dateTo', currentFilters.dateTo);
  if (currentFilters.tag) params.set('tag', currentFilters.tag);
  if (currentFilters.keyword) params.set('keyword', currentFilters.keyword);
  showToast('导出中…');
  const res = await fetch('/api/worklogs?' + params, { headers: authHeaders() });
  if (!res.ok) { showToast('导出失败'); return; }
  const { results } = await res.json();
  if (!results.length) { showToast('没有可导出的记录'); return; }
  const header = ['Date', 'Done', 'Tag', 'Plan', 'Problem', 'Thinking', 'Important', 'Author'];
  const lines = [header.map(escapeCSV).join(',')];
  results.forEach(r => {
    const p = getRecordTag(r) || {};
    lines.push([r.date, r.done, p.name || '', r.plan, r.problem, r.thinking, r.important, r.author_name].map(escapeCSV).join(','));
  });
  const blob = new Blob(['﻿' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'worklogs-all-' + new Date().toISOString().slice(0, 10) + '.csv';
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
  showToast('已导出 ' + results.length + ' 条记录');
}

function bulkDelete() {
  const ids = allRecords.filter(r => selectedIds.has(r.id)).map(r => r.id);
  if (!ids.length) return;
  if (pendingDelete) commitPendingDelete();
  ids.forEach(id => selectedIds.delete(id));
  pendingDelete = { ids };
  pendingDeleteIds = new Set(ids);
  renderTable();
  showUndoToast('已删除 ' + ids.length + ' 条记录');
  pendingDelete.timer = setTimeout(commitPendingDelete, UNDO_DELAY);
}

function queueNewRowFiles(input) {
  const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'application/pdf'];
  for (const f of input.files) {
    if (f.size > 5 * 1024 * 1024) { showToast(f.name + ' 超过5MB，已跳过'); continue; }
    if (!allowed.includes(f.type)) { showToast(f.name + ' 格式不支持，已跳过'); continue; }
    pendingNewRowFiles.push(f);
  }
  input.value = '';
  renderNewRowFilePreview();
}

function renderNewRowFilePreview() {
  const el = document.getElementById('nr_file_preview');
  if (!el) return;
  el.innerHTML = pendingNewRowFiles.map((f, i) =>
    '<span class="nr-file-tag"><span>' + escapeHTML(f.name) + '</span>' +
    '<button onclick="removeNewRowFile(' + i + ')">×</button></span>'
  ).join('');
}

function removeNewRowFile(i) {
  pendingNewRowFiles.splice(i, 1);
  renderNewRowFilePreview();
}

async function toggleExpand(id) {
  const row = document.getElementById('er_' + id);
  if (!row) return;
  const isOpen = row.style.display !== 'none';
  document.querySelectorAll('.expand-row').forEach(r => r.style.display = 'none');
  document.querySelectorAll('.data-row').forEach(r => r.classList.remove('row-expanded'));
  if (isOpen) return;
  row.style.display = 'table-row';
  const dr = document.querySelector('tr[data-rid="' + id + '"]');
  if (dr) dr.classList.add('row-expanded');
  await Promise.all([loadComments(id), loadAttachments(id)]);
}

async function loadComments(id, forceRefresh) {
  if (!forceRefresh && commentCache[id]) { renderComments(id, commentCache[id]); return; }
  const el = document.getElementById('cl_' + id);
  if (el && !commentCache[id]) el.innerHTML = '<div class="no-comment">加载中…</div>';
  const res = await fetch('/api/worklogs/' + id + '/comments', { headers: authHeaders() });
  if (!res.ok) return;
  const data = await res.json();
  commentCache[id] = data;
  renderComments(id, data);
}

function renderCommentText(text) {
  const m = (text || '').match(/^回复 @([^：\n]+)：([\s\S]*)$/);
  if (m) return '<span class="comment-reply-badge">回复 @' + escapeHTML(m[1]) + '</span>' + displayText(m[2]);
  return displayText(text);
}

function renderComments(id, comments) {
  const el = document.getElementById('cl_' + id);
  if (!el) return;
  if (!comments.length) { el.innerHTML = '<div class="no-comment">还没有评论，来第一个提问吧</div>'; return; }
  el.innerHTML = comments.map(c => {
    const t = c.created_at ? new Date(c.created_at * 1000).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    const isMe = currentUser && c.author_id === currentUser.id;
    const isAdm = currentUser && currentUser.isAdmin;
    const rawText = (c.text || '').replace(/^回复 @[^：\n]+：/, '');
    const excerpt = rawText.slice(0, 18) + (rawText.length > 18 ? '…' : '');
    return '<div class="comment-item">' +
      '<div class="comment-avatar-sm">' + (c.author_name ? c.author_name[0].toUpperCase() : '?') + '</div>' +
      '<div class="comment-body"><div class="comment-meta">' +
      '<span class="comment-name">' + escapeHTML(c.author_name) + '</span>' +
      '<span class="comment-time">' + t + '</span>' +
      ((isMe || isAdm) ? '<button class="btn-del-comment" onclick="delComment(' + id + ',' + c.id + ')">删除</button>' : '') +
      '<button class="btn-reply-sm" onclick="setReplyTo(' + id + ',' + JSON.stringify(c.author_name).replace(/"/g,'&quot;') + ',' + JSON.stringify(excerpt).replace(/"/g,'&quot;') + ')">回复</button>' +
      '</div><div class="comment-text">' + renderCommentText(c.text) + '</div></div></div>';
  }).join('');
}

function setReplyTo(id, name, excerpt) {
  const hint = document.getElementById('crh_' + id);
  const hintText = document.getElementById('crh_text_' + id);
  if (!hint || !hintText) return;
  hintText.textContent = '回复 @' + name + '：' + excerpt;
  hint.style.display = 'flex';
  const inp = document.getElementById('ci_' + id);
  if (inp) inp.focus();
}

function clearReplyTo(id) {
  const hint = document.getElementById('crh_' + id);
  if (hint) hint.style.display = 'none';
}

async function submitComment(id) {
  const inp = document.getElementById('ci_' + id);
  let text = inp && inp.value.trim();
  if (!text) return;
  const hint = document.getElementById('crh_' + id);
  if (hint && hint.style.display !== 'none') {
    const hintText = document.getElementById('crh_text_' + id);
    const m = hintText && hintText.textContent.match(/^回复 @([^：]+)：/);
    if (m) text = '回复 @' + m[1] + '：' + text;
  }
  inp.value = '';
  clearReplyTo(id);
  const res = await fetch('/api/worklogs/' + id + '/comments', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ text }) });
  if (res.ok) {
    delete commentCache[id];
    await loadComments(id, true);
    commentCounts[id] = (commentCounts[id] || 0) + 1;
    const cc = document.querySelector('tr[data-rid="' + id + '"] .btn-comment');
    if (cc) cc.textContent = '💬 ' + commentCounts[id];
    await checkNotifications();
  }
}

async function delComment(wid, cid) {
  if (!confirm('删除这条评论？')) return;
  const res = await fetch('/api/comments/' + cid, { method: 'DELETE', headers: authHeaders() });
  if (res.ok) { delete commentCache[wid]; await loadComments(wid, true); }
}

// ── Attachments ───────────────────────────────────────────────────────────
async function loadAttachments(wid) {
  const res = await fetch('/api/worklogs/' + wid + '/attachments', { headers: authHeaders() });
  if (!res.ok) return;
  renderAttachments(wid, await res.json());
}

function renderAttachments(wid, items) {
  const el = document.getElementById('al_' + wid);
  if (!el) return;
  const rec = allRecords.find(r => r.id === wid);
  const canEdit = currentUser && rec && (rec.author_id === currentUser.id || (currentUser.isAdmin));
  if (!items.length) { el.innerHTML = '<span class="no-attach">暂无附件</span>'; return; }
  el.innerHTML = items.map(a => {
    const isImage = a.file_type.startsWith('image/');
    const url = '/api/files/' + a.file_key;
    const sizeStr = a.file_size > 1024 * 1024
      ? (a.file_size / 1024 / 1024).toFixed(1) + ' MB'
      : Math.round(a.file_size / 1024) + ' KB';
    return '<div class="attach-item">' +
      (isImage
        ? '<a href="' + url + '" target="_blank"><img class="attach-thumb" src="' + url + '" alt="' + escapeHTML(a.file_name) + '" loading="lazy"/></a>'
        : '<a class="attach-file" href="' + url + '" target="_blank" download="' + escapeHTML(a.file_name) + '">📄 ' + escapeHTML(a.file_name) + '</a>') +
      '<span class="attach-name" title="' + escapeHTML(a.file_name) + '">' + escapeHTML(a.file_name) + '</span>' +
      '<span class="attach-name" style="color:#bcc4d0">' + sizeStr + '</span>' +
      (canEdit ? '<button class="btn-del-attach" onclick="delAttachment(' + wid + ',' + a.id + ')" title="删除">×</button>' : '') +
      '</div>';
  }).join('');
}

async function uploadAttachment(wid, input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('文件不能超过 5MB'); return; }
  const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'application/pdf'];
  if (!allowed.includes(file.type)) { showToast('仅支持 JPG / PNG / GIF / WebP 图片和 PDF'); return; }
  const el = document.getElementById('al_' + wid);
  if (el) el.innerHTML = '<span class="attach-uploading">上传中…</span>';
  const fd = new FormData();
  fd.append('file', file);
  const res = await fetch('/api/worklogs/' + wid + '/attachments', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('memory_token') },
    body: fd
  });
  if (res.ok) {
    showToast('上传成功 ✓');
    await loadAttachments(wid);
  } else {
    const data = await res.json().catch(() => ({}));
    showToast(data.error || '上传失败');
    await loadAttachments(wid);
  }
}

async function delAttachment(wid, aid) {
  if (!confirm('删除这个附件？')) return;
  const res = await fetch('/api/attachments/' + aid, { method: 'DELETE', headers: authHeaders() });
  if (res.ok) { showToast('已删除'); await loadAttachments(wid); } else showToast('删除失败');
}

// ── Notifications (DB-persisted) ───────────────────────────────────────────
async function checkNotifications() {
  if (!currentUser) return;
  try {
    const res = await fetch('/api/my-comment-notifications', { headers: authHeaders() });
    if (!res.ok) return;
    const { items, unread_count } = await res.json();
    const btn = document.getElementById('notifBtn');
    const badge = document.getElementById('notifCount');
    if (items.length > 0) {
      btn.style.display = 'inline-flex';
      badge.textContent = unread_count;
      badge.style.display = unread_count > 0 ? 'inline' : 'none';
    } else {
      btn.style.display = 'none';
    }
    const list = document.getElementById('notifList');
    if (!items.length) { list.innerHTML = '<div class="notif-empty">暂无新回复</div>'; return; }
    list.innerHTML = items.map(n => {
      const t = n.created_at ? new Date(n.created_at * 1000).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
      return '<div class="notif-item ' + (n.is_new ? 'unread' : '') + '" onclick="goToNotif(' + n.worklog_id + ',' + JSON.stringify(n.worklog_date) + ')">' +
        '<div class="notif-who"><span>' + escapeHTML(n.author_name) + '</span> 回复了你的记录「' + escapeHTML(n.worklog_date) + '」</div>' +
        '<div class="notif-time">' + t + '</div></div>';
    }).join('');
    window._notifs = items;
  } catch(e) {}
}

async function toggleNotif() {
  const panel = document.getElementById('notifPanel');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    await fetch('/api/notifications/mark-read', { method: 'POST', headers: authHeaders() });
    document.getElementById('notifCount').style.display = 'none';
    document.querySelectorAll('.notif-item').forEach(el => el.classList.remove('unread'));
  }
}

async function goToNotif(rid, worklogDate) {
  document.getElementById('notifPanel').style.display = 'none';
  const row = document.querySelector('tr[data-rid="' + rid + '"]');
  if (row) {
    await toggleExpand(rid);
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  // Record not on current page — filter by date to find it
  if (worklogDate) {
    document.getElementById('filterDateFrom').value = worklogDate;
    document.getElementById('filterDateTo').value = worklogDate;
    readFilters();
    await loadRecords(1);
    setTimeout(async () => {
      const row2 = document.querySelector('tr[data-rid="' + rid + '"]');
      if (row2) { await toggleExpand(rid); row2.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    }, 400);
  }
}

document.addEventListener('click', e => {
  const panel = document.getElementById('notifPanel');
  const btn = document.getElementById('notifBtn');
  if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) panel.style.display = 'none';
});

// ── Tag Management ─────────────────────────────────────────────────────────
function renderTagManage() {
  const list = document.getElementById('tagManageList');
  const newParentSel = document.getElementById('newTagParent');
  if (newParentSel) newParentSel.innerHTML = topLevelParentOptionsHtml(null, null);
  if (!list) return;
  if (!allTags.length) { list.innerHTML = '<div class="tag-manage-empty">暂无标签</div>'; return; }
  const top = allTags.filter(t => !t.parent_id);
  const childrenOf = pid => allTags.filter(t => t.parent_id === pid);
  const row = (t, isChild) =>
    '<div class="tag-manage-row' + (isChild ? ' tag-manage-child' : '') + '">' +
    '<input id="tag_edit_' + t.id + '" value="' + escapeHTML(t.name) + '"/>' +
    '<select id="tag_parent_' + t.id + '" class="tag-parent-select">' + topLevelParentOptionsHtml(t.parent_id || null, t.id) + '</select>' +
    '<div class="tag-manage-actions"><button class="btn-sv" onclick="renameTag(' + t.id + ')">保存</button>' +
    '<button class="btn-del" onclick="deleteTag(' + t.id + ')">删除</button></div></div>';
  list.innerHTML = top.map(p => row(p, false) + childrenOf(p.id).map(c => row(c, true)).join('')).join('');
}

async function showTagManage() { showModal('tagManageModal'); await loadTags(); renderTagManage(); }
function hideTagManage() { hideModal('tagManageModal'); }

async function addTag() {
  const input = document.getElementById('newTagName');
  const parentSel = document.getElementById('newTagParent');
  const name = (input && input.value || '').trim();
  if (!name) { showToast('标签名不能为空'); return; }
  const parentId = parentSel && parentSel.value ? parseInt(parentSel.value) : null;
  const res = await fetch('/api/tags', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ name, parentId }) });
  const data = await res.json();
  if (!res.ok) { showToast(data.error || '添加失败'); return; }
  input.value = '';
  if (parentSel) parentSel.value = '';
  await loadTags(); renderTagManage(); renderTable();
}

async function renameTag(id) {
  const input = document.getElementById('tag_edit_' + id);
  const parentSel = document.getElementById('tag_parent_' + id);
  const name = (input && input.value || '').trim();
  if (!name) { showToast('标签名不能为空'); return; }
  const parentId = parentSel && parentSel.value ? parseInt(parentSel.value) : null;
  const res = await fetch('/api/tags/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ name, parentId }) });
  const data = await res.json();
  if (!res.ok) { showToast(data.error || '保存失败'); return; }
  await loadTags(); await loadRecords(currentPage); renderTagManage();
}

async function deleteTag(id) {
  if (!confirm('确定删除这个标签？相关记录会取消标签关联，若有子标签会变为一级标签')) return;
  const res = await fetch('/api/tags/' + id, { method: 'DELETE', headers: authHeaders() });
  if (!res.ok) { showToast('删除失败'); return; }
  await loadTags(); await loadRecords(currentPage); renderTagManage();
}

async function showTagByName(name) {
  if (!name) return;
  showModal('tagModal');
  document.getElementById('tagTitle').textContent = name;
  document.getElementById('tagMeta').textContent = '加载中...';
  document.getElementById('tagTimeline').innerHTML = '';
  const entries = [], seen = {};
  const project = (allTags || []).find(p => p.name === name);
  if (project) {
    const res = await fetch('/api/tags/' + project.id + '/entries', { headers: authHeaders() });
    if (res.ok) (await res.json()).forEach(e => { entries.push(e); seen[e.worklog_id] = true; });
  }
  allRecords.forEach(r => {
    const p = getRecordTag(r);
    if (p && p.name === name && !seen[r.id]) entries.push({ worklog_id: r.id, date: r.date, done: r.done, plan: r.plan, thinking: r.thinking });
  });
  entries.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
  document.getElementById('tagTitle').textContent = name;
  document.getElementById('tagMeta').textContent = entries.length ? '共 ' + entries.length + ' 条相关记录' : '还没有相关记录';
  document.getElementById('tagTimeline').innerHTML = entries.length ? entries.map(e => {
    const note = e.done || e.plan || e.thinking || '';
    return '<div class="tag-entry"><div class="tag-date">' + escapeHTML(e.date) + '</div><div><div class="tag-note">' + escapeHTML(note) + '</div></div></div>';
  }).join('') : '<div class="notif-empty">暂无相关记录</div>';
}

function hideTagModal() { hideModal('tagModal'); }

// ── Stats ──────────────────────────────────────────────────────────────────
async function showStatsPanel() {
  showModal('statsModal');
  document.getElementById('stat_total').textContent = '–';
  document.getElementById('stat_month').textContent = '–';
  document.getElementById('stat_streak').textContent = '–';
  const res = await fetch('/api/my-stats', { headers: authHeaders() });
  if (!res.ok) return;
  const data = await res.json();
  document.getElementById('stat_total').textContent = data.total;
  document.getElementById('stat_month').textContent = data.month;
  document.getElementById('stat_streak').textContent = data.streak;
}
function hideStatsPanel() { hideModal('statsModal'); }

// ── Admin ──────────────────────────────────────────────────────────────────
async function showAdminPanel() {
  showModal('adminModal');
  const res = await fetch('/api/admin/users', { headers: authHeaders() });
  const users = await res.json();
  document.getElementById('adminUserList').innerHTML = users.map(u =>
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e0e4eb;">' +
    '<div><div style="font-size:.84rem;font-weight:600;color:#1a2030;">' + escapeHTML(u.name) + '</div>' +
    '<div style="font-size:.75rem;color:#8a94a6;">' + escapeHTML(u.email) + '</div></div>' +
    '<button class="btn-logout" onclick="showResetModal(' + u.id + ',this.dataset.name)" data-name="' + escapeHTML(u.name) + '">重置密码</button></div>'
  ).join('');
}
function hideAdminPanel() { hideModal('adminModal'); }

function showResetModal(uid, uname) {
  resetTargetId = uid;
  document.getElementById('resetTargetName').textContent = '为「' + uname + '」重置密码';
  document.getElementById('reset_new').value = '';
  document.getElementById('reset_error').textContent = '';
  showModal('resetModal');
}
function hideResetModal() { hideModal('resetModal'); }

async function doResetPwd() {
  const newP = document.getElementById('reset_new').value;
  const errEl = document.getElementById('reset_error');
  errEl.textContent = '';
  if (!newP) { errEl.textContent = '请填写新密码'; return; }
  if (newP.length < 6) { errEl.textContent = '密码至少6位'; return; }
  const res = await fetch('/api/admin/reset-password', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ userId: resetTargetId, newPassword: newP }) });
  const data = await res.json();
  if (!res.ok) { errEl.textContent = data.error; return; }
  hideResetModal(); hideAdminPanel(); showToast('密码已重置 ✓');
}

// ── Password Change ────────────────────────────────────────────────────────
function showChangePwd() {
  document.getElementById('pwd_old').value = '';
  document.getElementById('pwd_new').value = '';
  document.getElementById('pwd_confirm').value = '';
  document.getElementById('pwd_error').textContent = '';
  showModal('pwdModal');
}
function hideChangePwd() { hideModal('pwdModal'); }

async function doChangePwd() {
  const oldP = document.getElementById('pwd_old').value;
  const newP = document.getElementById('pwd_new').value;
  const cfm = document.getElementById('pwd_confirm').value;
  const errEl = document.getElementById('pwd_error');
  errEl.textContent = '';
  if (!oldP || !newP || !cfm) { errEl.textContent = '请填写所有字段'; return; }
  if (newP !== cfm) { errEl.textContent = '两次新密码不一致'; return; }
  if (newP.length < 6) { errEl.textContent = '新密码至少6位'; return; }
  const res = await fetch('/api/change-password', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ oldPassword: oldP, newPassword: newP }) });
  const data = await res.json();
  if (!res.ok) { errEl.textContent = data.error; return; }
  hideChangePwd(); showToast('密码修改成功 ✓');
}
</script>
